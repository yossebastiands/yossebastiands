backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: products
    label: Products
    folder: src/data/products
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string, required: true }
      - { label: Description, name: description, widget: string, required: true }
      - label: Venture
        name: venture
        widget: select
        options:
          - AFP
          - MBO
          - Opventra
      - { label: Link, name: link, widget: string, required: false, hint: "External URL to Tebex, Gumroad, etc." }
